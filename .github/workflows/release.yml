name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # Same gate as CI (see ci.yml) — a broken tag shouldn't ship. Tags
      # aren't guaranteed to have already gone through CI (e.g. tagging an
      # older commit), so this can't be skipped.
      - name: Type check + lint
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build bundle
        run: npm run build

      - name: Package release archives
        id: package
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="$(mktemp -d)/cast"
          mkdir -p "$STAGE"
          cp -r dist "$STAGE/"
          cp -r prompts "$STAGE/"
          cp -r bin "$STAGE/"
          cp package.json README.md "$STAGE/"
          chmod +x "$STAGE/bin/cast"

          mkdir -p out
          tar -C "$(dirname "$STAGE")" -czf "out/cast-${VERSION}.tar.gz" cast
          (cd "$(dirname "$STAGE")" && zip -rq "$OLDPWD/out/cast-${VERSION}.zip" cast)

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            out/cast-${{ steps.package.outputs.version }}.tar.gz
            out/cast-${{ steps.package.outputs.version }}.zip
